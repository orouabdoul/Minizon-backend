services:
  - type: web
    name: minizon-api
    env: docker
    plan: free
    branch: main
    autoDeploy: yes
    healthCheckPath: /api/ping
    envVars:
      - key: APP_NAME
        value: Minizon
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://minizon-api.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: public
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: auto
      - key: AWS_BUCKET
        sync: false
      - key: AWS_ENDPOINT
        sync: false
      - key: AWS_URL
        sync: false
      - key: AWS_USE_PATH_STYLE_ENDPOINT
        value: true
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_LIFETIME
        value: 120
      - key: L5_SWAGGER_GENERATE_ALWAYS
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: minizon-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: minizon-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: minizon-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: minizon-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: minizon-db
          property: password
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_PUBLIC_KEY
        sync: false
      - key: FEDAPAY_ENVIRONMENT
        value: sandbox
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false
      - key: FEDAPAY_CALLBACK_URL
        value: https://minizon-api.onrender.com/api/payments/callback
      - key: FEDAPAY_COMMISSION_RATE
        value: 10
      - key: FCM_SERVER_KEY
        sync: false

databases:
  - name: minizon-db
    databaseName: minizon_db
    user: minizon
    plan: free
