name: CI/CD — Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------
  # Job 1 — Vérification syntaxe PHP
  # ----------------------------------------------------------------
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring, bcmath, gd, exif, pcntl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Check PHP syntax
        run: find app -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      - name: Validate routes & config (dry run)
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
          php artisan route:list

  # ----------------------------------------------------------------
  # Job 2 — Deploy sur Render (push main seulement)
  # ----------------------------------------------------------------
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered successfully"
